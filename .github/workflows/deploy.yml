name: Deploy Asset Inventory

on:
  push:
    branches:
      - main # (Pastikan nama branch lu bener 'main', bukan 'master')

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 🚀 Update, Build, & Restart PM2
        # Kita paksa runner untuk pindah folder dulu sebelum eksekusi
        run: |
          cd /var/www/asset-inventory
          git pull origin main
          npm install
          npx prisma generate
          npx next build
          pm2 restart asset-inventory