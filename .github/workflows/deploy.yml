name: Deploy Asset Inventory

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 🚀 Update, Build, & Restart PM2
        # Kita pakai jurus Hard Reset biar VM selalu nurut 100% sama GitHub
        run: |
          cd /var/www/asset-inventory
          git fetch origin main
          git reset --hard origin/main
          npm install
          npx prisma generate
          npx next build
          pm2 restart asset-inventory